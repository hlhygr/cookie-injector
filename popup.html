<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cookie Injector</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="popup-content">
        <div id="cookie-injector-ui">
            <div class="header">
                <div>
                    <span class="eyebrow">Chrome Extension</span>
                    <h1 id="ui-header">正在加载...</h1>
                </div>
                <span class="status-dot" aria-hidden="true"></span>
            </div>
            <div class="info" id="ui-info"></div>
            <label class="cookie-label" for="cookie-data-display">Cookie 数据</label>
            <textarea id="cookie-data-display" rows="6" spellcheck="false"></textarea>
            <div class="actions">
                <button class="secondary-btn" id="copy-btn">复制</button>
                <button class="primary-btn" id="apply-btn">应用到当前页面</button>
            </div>
            <div class="message" id="message" role="status" aria-live="polite"></div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
